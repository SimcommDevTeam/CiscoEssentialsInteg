version: 1
frontend:
  phases:
    preBuild:
      commands:        
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "DB_SERVER=$DB_SERVER" >> .env.production
        - echo "DB_DATABASE=$DB_DATABASE" >> .env.production
        - echo "DB_USER=$DB_USER" >> .env.production
        - echo "DB_PASSWORD=$DB_PASSWORD" >> .env.production
        - echo "DB_PORT=$DB_PORT" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*